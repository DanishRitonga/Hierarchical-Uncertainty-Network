global_settings:
  root_dir: "/home/danishrtg/projects/HiEvNet/hievnet/data/dataset"
  # root_dir: "/mnt/data/projects/HiEvNet/hievnet/data/dataset"
  output_image_size: [1024, 1024]
  output_mpp: 0.25
  patching_overlap_pct: 10
  annotation_type : "bbox"

  global_cell_map:
    "Background" : 0
    "Lymphocyte" : 1
    "Immune Cells" : 2
    "Epithelial" : 3
    "Stroma" : 4
    "Ignore" : 255
  
  global_tissue_map:
    "Breast" : 0
    "Kidney" : 1
    "Lung" : 2
    "Prostate" : 3
    "Melanoma" : 4

datasets:
  MoNuSAC:
    root_dir: "MoNuSAC/data"
    ingestion_method: 1 # Parquet
    native_mpp : 0.25

    split_separation: "filename_regex"
    split_args:
      regex: "(train|test)"
    modality_separation: "bundled_archive"
    
    namespace_map:
      '0': 'Ignore'
      '1': 'Epithelial'
      '2': 'Lymphocyte'
      '3': 'Immune Cells'
      '4': 'Immune Cells'
    tissue_map:
      '0': 'Breast'
      '1': 'Kidney'
      '2': 'Lung'
      '3': 'Prostate'

  PanopTILs:
    root_dir: "PanopTILs"
    ingestion_method: 5 # CSV Polygons
    native_mpp : 0.25

    split_separation: "physical"
    split_dirs:
      train_dir: "BootstrapNucleiManualRegions_TCGA/tcga"
      val_dir: "ManualNucleiManualRegions"
    modality_separation: "physical_parallel"
    modality_dirs:
      image_dir: "rgbs"
      mask_dir: "csv"
    modality_pairing_rule:
      match_extension: ".csv"
    csv_column_map:
      x_coords: "coords_x" 
      y_coords: "coords_y"
      category: "group"

    namespace_map:
      'CancerEpithelium': 'Epithelial'
      'UnknownOrAmbiguousCell': 'Ignore'
      'StromalCellNOS': 'Stroma'
      'ActiveStromalCellNOS': 'Stroma'
      'TILsCell': 'Lymphocyte'
      'ActiveTILsCell': 'Immune Cells'
      'OtherCell': 'Ignore'
      'NormalEpithelium': 'Epithelial'

    tissue_type: "Breast"

  PUMA:
    root_dir: "PUMA"
    ingestion_method: 4 # GeoJSON
    native_mpp : 0.22

    split_separation: "filename_regex"
    split_args:
      regex: "(training_set)" 
    modality_separation: "physical_parallel"
    modality_dirs:
      image_dir: "01_training_dataset_tif_ROIs"
      mask_dir: "01_training_dataset_geojson_nuclei"
    modality_pairing_rule:
      match_extension: ".geojson"
      add_suffix: "_nuclei"

    namespace_map:
      'nuclei_tumor': 'Epithelial'
      'nuclei_lymphocyte': 'Lymphocyte'
      'nuclei_plasma_cell': 'Immune Cells'
      'nuclei_histiocyte': 'Immune Cells'
      'nuclei_melanophage': 'Immune Cells'
      'nuclei_neutrophil': 'Immune Cells'
      'nuclei_stroma': 'Stroma'
      'nuclei_endothelium': 'Stroma'
      'nuclei_epithelium': 'Epithelial'
      'nuclei_apoptosis': 'Ignore'
    tissue_type: "Melanoma"


