#dataset config keys
validation:
  required_globals:
    - root_dir
    - output_image_size
    - output_mpp
    - patching_overlap_pct
  
  dataset_required_keys:
    - root_dir
    - ingestion_method
    - split_separation
    - modality_separation
  
  valid_split_seps:
    - physical
    - filename_regex
    - none
  
  valid_mod_seps:
    - physical_parallel
    - physical_flat
    - bundled_archive

# registry config
# Define what fields are required based on split_separation value
split_separation_config:
  physical:
    required_fields:
      - split_dirs
    constraints:
      split_dirs_keys_must_end_with: _dir
  
  filename_regex:
    required_fields:
      - split_args
    constraints:
      split_args_must_contain: regex
  
  none:
    required_fields: []

# Define what fields are required based on modality_separation value
modality_separation_config:
  physical_parallel:
    required_fields:
      - modality_dirs
    constraints:
      modality_dirs_must_contain:
        - image_dir
        - mask_dir
  
  physical_flat:
    required_fields:
      - modality_pairing_rule
    constraints:
      modality_pairing_rule_must_contain: match_extension
  
  bundled_archive:
    required_fields: []
